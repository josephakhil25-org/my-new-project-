<!DOCTYPE html>
<html>
<head>
  <title>Landmark Restaurant Menu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
    }

    header {
      text-align: center;
      padding: 15px;
      font-size: 26px;
      font-weight: bold;
    }

    .section {
      padding: 20px;
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
      border-left: 5px solid #ff4d4d;
      padding-left: 10px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border-radius: 15px;
      padding: 15px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: 10px;
      height: 160px;
      object-fit: cover;
    }

    .price {
      margin: 5px 0;
      color: #ffcc00;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>🍽 Landmark Family Restaurant</header>

<!-- 🍛 BIRYANI -->
<div class="section">
  <div class="title">🍛 Biryani</div>
  <div class="container">

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?chicken-biryani">
      <h3>Chicken Biryani</h3>
      <p class="price">₹309</p>
      <a class="btn" href="#">Order</a>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?mutton-biryani">
      <h3>Mutton Biryani</h3>
      <p class="price">₹349</p>
      <a class="btn" href="#">Order</a>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?prawns-biryani">
      <h3>Prawns Biryani</h3>
      <p class="price">₹379</p>
      <a class="btn" href="#">Order</a>
    </div>

  </div>
</div>

<!-- 🍗 MANDI -->
<div class="section">
  <div class="title">🍗 Mandi</div>
  <div class="container">

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?chicken-mandi">
      <h3>Chicken Mandi</h3>
      <p class="price">₹269</p>
      <a class="btn" href="#">Order</a>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?mutton-mandi">
      <h3>Mutton Mandi</h3>
      <p class="price">₹289</p>
      <a class="btn" href="#">Order</a>
    </div>

  </div>
</div>

<!-- 🍢 STARTERS -->
<div class="section">
  <div class="title">🍢 Starters</div>
  <div class="container">

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?chicken-65">
      <h3>Chicken 65</h3>
      <p class="price">₹298</p>
      <a class="btn" href="#">Order</a>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?butter-chicken">
      <h3>Butter Chicken</h3>
      <p class="price">₹249</p>
      <a class="btn" href="#">Order</a>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?paneer-manchurian">
      <h3>Paneer Manchurian</h3>
      <p class="price">₹233</p>
      <a class="btn" href="#">Order</a>
    </div>

  </div>
</div>

</body>
</html>
