<!DOCTYPE html>
<html>
<head>
  <title>Landmark Restaurant Menu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #141e30, #243b55);
      color: white;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .section {
      padding: 20px;
    }

    .title {
      font-size: 22px;
      margin-bottom: 10px;
      border-left: 5px solid #ff4d4d;
      padding-left: 10px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(8px);
      border-radius: 15px;
      padding: 15px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      border-radius: 10px;
      height: 150px;
      object-fit: cover;
    }

    .price {
      margin: 10px 0;
      font-weight: bold;
    }

    .btn {
      display: inline-block;
      padding: 8px 12px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .btn:hover {
      background: #1ebc59;
    }
  </style>
</head>

<body>
