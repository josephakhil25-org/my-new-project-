<!DOCTYPE html>
<html>
<head>
  <title>Food Menu</title>

  <style>
    body {
      font-family: Arial;
      background: #121212;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      padding: 20px;
      color: #ffcc00;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e1e1e;
      margin: 15px;
      width: 260px;
      border-radius: 15px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 20px rgba(255,255,255,0.15);
    }

    img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    h2 {
      padding: 10px;
      color: #ffcc00;
    }

    p {
      padding: 0 10px 10px;
      font-size: 14px;
      color: #ccc;
    }
  </style>

</head>

<body>

<h1>🔥 Food Menu 🔥</h1>

<div class="container">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1604908176997-431c8c7b1e56">
    <h2>Chicken Mandi</h2>
    <p>Juicy mandi with rich flavor rice 🍗</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1625944525903-7c4b4b06c6f3">
    <h2>Mutton Mandi</h2>
    <p>Soft mutton with spicy aroma 🥩</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1625944231341-0e0a8a5e50d1">
    <h2>Chicken 65</h2>
    <p>Crispy spicy starter 🔥</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1631452180519-c014fe946bc7">
    <h2>Paneer Manchurian</h2>
    <p>Indo-Chinese favorite 🧀</p>
  </div>

</div>

</body>
</html>
